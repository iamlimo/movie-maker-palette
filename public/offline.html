<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Signature TV is offline</title>
    <meta name="theme-color" content="#0a0a0a" />
    <meta
      name="description"
      content="You’re offline. Signature TV will reconnect automatically when your network returns."
    />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, rgba(217, 119, 6, 0.18), transparent 30%),
          linear-gradient(180deg, #121212 0%, #0a0a0a 100%);
        color: #fff;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: min(100%, 560px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(17, 17, 17, 0.86);
        backdrop-filter: blur(18px);
        border-radius: 24px;
        padding: 32px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
      }

      .brand-mark {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        background: linear-gradient(135deg, #f59e0b, #ef4444);
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: 20px;
        letter-spacing: 0.04em;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 5vw, 42px);
        line-height: 1.1;
      }

      p {
        margin: 0;
        color: rgba(255, 255, 255, 0.78);
        line-height: 1.65;
        font-size: 16px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 28px;
      }

      button,
      a {
        appearance: none;
        border: 0;
        border-radius: 999px;
        font: inherit;
        font-weight: 600;
        padding: 14px 18px;
        cursor: pointer;
        text-decoration: none;
        transition: transform 140ms ease, opacity 140ms ease, background 140ms ease;
      }

      button:hover,
      a:hover {
        transform: translateY(-1px);
      }

      .primary {
        background: linear-gradient(135deg, #f59e0b, #ef4444);
        color: #111;
      }

      .secondary {
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }

      .status {
        margin-top: 22px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.68);
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #f59e0b;
        box-shadow: 0 0 0 6px rgba(245, 158, 11, 0.14);
      }

      .offline .dot {
        background: #f97316;
        box-shadow: 0 0 0 6px rgba(249, 115, 22, 0.14);
      }

      .online .dot {
        background: #22c55e;
        box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.14);
      }

      @media (max-width: 480px) {
        .card {
          padding: 24px;
          border-radius: 20px;
        }

        .actions {
          flex-direction: column;
        }

        button,
        a {
          width: 100%;
          text-align: center;
        }
      }
    </style>
  </head>
  <body>
    <main class="card offline" id="card">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">ST</div>
        <strong>Signature TV</strong>
      </div>

      <h1>You’re offline</h1>
      <p>
        We can’t reach the network right now. Your last cached content may still be available,
        and the app will reconnect automatically when you’re back online.
      </p>

      <div class="actions">
        <button class="primary" id="retryButton" type="button">Try again</button>
        <a class="secondary" href="/" rel="noreferrer">Go to home</a>
      </div>

      <div class="status" id="statusText">
        <span class="dot" aria-hidden="true"></span>
        <span>Waiting for connection…</span>
      </div>
    </main>

    <script>
      const card = document.getElementById('card');
      const statusText = document.getElementById('statusText');
      const retryButton = document.getElementById('retryButton');

      const updateConnectionState = () => {
        const online = navigator.onLine;
        card.classList.toggle('online', online);
        card.classList.toggle('offline', !online);
        statusText.innerHTML = online
          ? '<span class="dot" aria-hidden="true"></span><span>Connection restored. Reloading…</span>'
          : '<span class="dot" aria-hidden="true"></span><span>Waiting for connection…</span>';

        if (online) {
          window.setTimeout(() => window.location.reload(), 600);
        }
      };

      retryButton.addEventListener('click', () => {
        window.location.reload();
      });

      window.addEventListener('online', updateConnectionState);
      window.addEventListener('offline', updateConnectionState);
      updateConnectionState();
    </script>
  </body>
</html>
